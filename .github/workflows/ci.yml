name: CI

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t planetopbr-ci .

      - name: Run tests
        run: docker run --rm planetopbr-ci

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create extension zip
        run: |
          zip -r planetopbr.zip \
            __init__.py \
            blender_manifest.toml \
            README.md \
            LICENSE \
            scripts \
            assets

      - name: Validate zip structure
        run: |
          unzip -l planetopbr.zip

          if unzip -l planetopbr.zip | grep -q "PlaneToPBR-main"; then
            echo "Zip contains nested repository folder"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: planetopbr-extension
          path: planetopbr.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: planetopbr-extension

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: planetopbr.zip
